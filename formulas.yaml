excel_formulas:
  O/U: >
    =IF(K2<L2, 1, 0)

  totals:
    stake: >
      =IF(
        H2="Over/Under 1.5 Goals",
        {G1_5},
        IF(
          H2="Over/Under 2.5 Goals",
          {G2_5},
          IF(
            H2="Over/Under 3.5 Goals",
            {G3_5},
            ""
          )
        )
      )
    g1_5: >
      =IF(R2>=4000,"",IF(OR(ISBLANK(L2),ISBLANK(R2),ISBLANK({ODDS})),"",IF(AND(L2<=3.5,R2>=70),IF({ODDS}>=2.3,2,IF({ODDS}<=1.44,IF(L2<=2.3,1,""),1)),"")))

    g2_5: >
      =IF(OR(ISBLANK(L2),ISBLANK(R2),ISBLANK({ODDS})),"",
      IF(R2>=3500,"",
        IF(AND(L2<=4.1,R2>=155),
          IF({ODDS}>=2,2,1),
        "")))

    g3_5: >
      =IF(
        OR(R2>5500, ISBLANK(L2), ISBLANK(R2), ISBLANK({ODDS})),
        "",
        IF(
          OR(
            AND({ODDS}>=2.69, L2<=5.5, R2>=125),
            AND({ODDS}>=2, {ODDS}<2.69, L2<=2.1, R2>=125),
            AND({ODDS}>=1.85, {ODDS}<2, L2<=6.6, R2>=190)
          ),
          2,
          IF(
            OR(
              AND({ODDS}>=1.76, {ODDS}<1.85, L2<=6.6, R2>=190),
              AND({ODDS}>=1.45, {ODDS}<1.76, L2<=4.9, R2>=190),
              AND({ODDS}>=1.27, {ODDS}<1.45, L2<=3.6, R2>=190),
              AND({ODDS}<1.27, L2<=2.4, R2>=190)
            ),
            1,
            ""
          )
        )
      )

  btts:
    stake: >
      =IF(
        OR(R2>7000, ISBLANK(L2), ISBLANK(R2)),
        "",
        IF(AND(L2<=4.6, R2>=240, {ODDS}>=1.9), 2,
          IF(AND(L2<=4.7, R2>=240, {ODDS}<1.6, L2<=2), 1,
            IF(AND(L2<=4.7, R2>=240, {ODDS}>=1.6, {ODDS}<1.7, L2<=2.5), 1,
              IF(AND(L2<=4.7, R2>=240, {ODDS}>=1.7, {ODDS}<1.9, L2<=3.2), 1,
                ""
              )
            )
          )
        )
      )







# K = volume
# L = Lowest RPD
# I = Betfair Odds (for outcome with the lowest RPD)
# 1 = 1 stake
# 2 = 2 stakes

