excel_formulas:
  # T = prediction: 0 = Under/No, 1 = Over/Yes
  # {ODDS} = BF odds for the side with lower RPD
  # {RPD} = RPD for the side with lower RPD
  # R = total_volume
  #
  # Master-aligned staking:
  #   Core: pred=0, BF>1.45, vol 40-1100, RPD<=2.8 (BF<=2.7) or RPD<=3.5 (BF>2.7)
  #   BTTS fade: pred=0, RPD>=5, vol 40-1100
  #   1.5G fade: pred=1, RPD>=4.6, vol 40-1100
  #   Double-staking handled in master sheet only

  O/U: >
    =IF(K2<L2, 1, 0)

  totals:
    g1_5: >
      =IF(OR(ISBLANK({RPD}),ISBLANK(R2),ISBLANK({ODDS})),"",
        IF(AND(T2=0,{ODDS}>1.45,{ODDS}<=2.7,{RPD}<=2.8,R2>=40,R2<=1100),1,
          IF(AND(T2=0,{ODDS}>2.7,{RPD}<=3.5,R2>=40,R2<=1100),1,
            IF(AND(T2=1,{RPD}>=4.6,R2>=40,R2<=1100),1,
              ""))))

    g2_5: >
      =IF(OR(ISBLANK({RPD}),ISBLANK(R2),ISBLANK({ODDS})),"",
        IF(AND(T2=0,{ODDS}>1.45,{ODDS}<=2.7,{RPD}<=2.8,R2>=40,R2<=1100),1,
          IF(AND(T2=0,{ODDS}>2.7,{RPD}<=3.5,R2>=40,R2<=1100),1,
            "")))

    g3_5: >
      =IF(OR(ISBLANK({RPD}),ISBLANK(R2),ISBLANK({ODDS})),"",
        IF(AND(T2=0,{ODDS}>1.45,{ODDS}<=2.7,{RPD}<=2.8,R2>=40,R2<=1100),1,
          IF(AND(T2=0,{ODDS}>2.7,{RPD}<=3.5,R2>=40,R2<=1100),1,
            "")))

  btts:
    stake: >
      =IF(OR(ISBLANK({RPD}),ISBLANK(R2)),"",
        IF(AND(T2=0,{ODDS}>1.45,{ODDS}<=2.7,{RPD}<=2.8,R2>=40,R2<=1100),1,
          IF(AND(T2=0,{ODDS}>2.7,{RPD}<=3.5,R2>=40,R2<=1100),1,
            IF(AND(T2=0,{RPD}>=5,R2>=40,R2<=1100),1,
              ""))))